name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Python checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas matplotlib seaborn numpy azure-storage-blob

      - name: Run data analysis script
        run: |
          mkdir -p outputs
          python data_analysis.py

      - name: Check serverless function syntax
        run: python -m py_compile serverless_function.py && echo "serverless_function.py syntax OK"

  build:
    name: Build and run Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t diet-analysis .

      - name: Run container (simulated deployment)
        run: |
          mkdir -p outputs
          docker run --rm -v ${{ github.workspace }}/outputs:/app/outputs diet-analysis

      - name: Log in to Docker Hub
        continue-on-error: true
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push image to Docker Hub
        continue-on-error: true
        run: |
          docker tag diet-analysis ${{ secrets.DOCKERHUB_USERNAME }}/diet-analysis:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/diet-analysis:latest
